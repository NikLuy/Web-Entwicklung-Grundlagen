<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular</title>
    <link rel="stylesheet" href="form.css">
    <style>

        /* Exercise form layout */
        .card {
            max-width: 760px;
            margin: 40px auto;
            padding: 15px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .card h1 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #2f2f2f;
            font-size: 32px;
        }

        /* CSS Grid Layout für das Formular */
        .form-demo {
            margin: 0;
            display: grid; /* Aktiviert CSS Grid Layout */
            grid-template-columns: 1fr 2fr; /* 2 Spalten: Label (1 Teil) und Input (2 Teile breit) */
            gap: 12px 16px; /* Abstand zwischen Zeilen (12px) und Spalten (16px) */
            align-items: start; /* Richtet Grid-Elemente oben aus */
        }

        .form-demo label {
            text-align: left;
            font-weight: 600;
            padding-top: 8px;
        }

        .form-demo input,
        .form-demo textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #b5b5b5;
            border-radius: 6px;
            font: inherit;
            margin: 0;
            box-sizing: border-box;
        }

        .form-demo textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-demo-submit {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            background-color: #2e6aa5;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            grid-column: 1 / 3; /* Erstreckt sich über beide Spalten (von Spalte 1 bis 3) */
        }

        .form-demo-submit:hover {
            background-color: #245686;
        }
        </style>
</head>
<body>
    <div class="card">
        <h1>Kontaktformular</h1>

        <form class="form-demo" action="#" method="post" >
            <label for="vorname">Vorname</label>
            <input type="text" id="vorname" name="vorname" required>

            <label for="nachname">Nachname</label>
            <input type="text" id="nachname" name="nachname" required>

            <label for="email">E-Mail-Adresse</label>
            <input type="email" id="email" name="email" required>

            <label for="nachricht">Nachricht</label>
            <textarea id="nachricht" name="nachricht" rows="5" required></textarea>

            <button type="submit" class="form-demo-submit">Abschicken</button>
        </form>
    </div>
</body>
</html>
